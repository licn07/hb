<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的邮箱</title>
    <style>
        body { margin: 0; background: #fff5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }
        .view { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 20px; margin: 10px 0; border: 2px solid #eee; border-radius: 16px; font-size: 18px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 20px; border: none; border-radius: 16px; background: #000; color: white; font-size: 18px; font-weight: bold; margin-top: 10px; }
        
        /* 多账号列表样式 */
        .account-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; font-size: 18px; }
        .petal { position: absolute; background: #ffcce0; border-radius: 50%; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="view-list" class="view">
        <div class="card">
            <h2 style="margin-top:0">账号列表</h2>
            <div id="list-container"></div>
            <button onclick="showPage('view-add')">+ 添加账号</button>
        </div>
    </div>

    <div id="view-add" class="view" style="display:none;">
        <div class="card">
            <h2>设置新账号</h2>
            <input type="text" id="in-prefix" placeholder="前缀 (使用 1secmail 后缀)">
            <input type="password" id="in-pass" placeholder="设置访问密码">
            <button onclick="saveAccount()">保存并进入</button>
            <button style="background:#eee; color:#000" onclick="showPage('view-list')">返回</button>
        </div>
    </div>

    <div id="view-inbox" class="view" style="display:none;">
        <div class="card">
            <h3 id="email-title"></h3>
            <button onclick="checkMails()">🔄 刷新收件箱</button>
            <div id="mail-list" style="margin:20px 0; min-height:100px;"></div>
            <button style="background:#ff3b30" onclick="showPage('view-list')">退出登录</button>
        </div>
    </div>

    <script>
        let accounts = JSON.parse(localStorage.getItem('my_mails') || '[]');
        let currentIdx = -1;

        function showPage(id) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            if(id === 'view-list') renderList();
        }

        function renderList() {
            const container = document.getElementById('list-container');
            container.innerHTML = accounts.map((acc, i) => `
                <div class="account-item" onclick="tryLogin(${i})">
                    <span>${acc.email}</span> <span>🔑</span>
                </div>
            `).join('');
        }

        function saveAccount() {
            const prefix = document.getElementById('in-prefix').value;
            const pass = document.getElementById('in-pass').value;
            accounts.push({ email: prefix + "@1secmail.com", pass: pass, prefix: prefix });
            localStorage.setItem('my_mails', JSON.stringify(accounts));
            showPage('view-list');
        }

        function tryLogin(idx) {
            const p = prompt("请输入访问密码:");
            if(p === accounts[idx].pass) {
                currentIdx = idx;
                document.getElementById('email-title').innerText = accounts[idx].email;
                showPage('view-inbox');
                checkMails();
            } else {
                alert("密码错误");
            }
        }

        async function checkMails() {
            const acc = accounts[currentIdx];
            const list = document.getElementById('mail-list');
            list.innerHTML = "加载中...";
            const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${acc.prefix}&domain=1secmail.com`);
            const data = await res.json();
            list.innerHTML = data.length ? data.map(m => `<div>${m.from}</div>`).join('') : "暂无邮件";
        }

        // 花瓣特效
        setInterval(() => {
            const p = document.createElement('div');
            p.className = 'petal';
            const size = Math.random()*15+5 + 'px';
            p.style.width = p.style.height = size;
            p.style.left = Math.random()*100 + '%';
            p.style.animationDuration = Math.random()*3+3 + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 6000);
        }, 800);
    </script>
</body>
</html>
