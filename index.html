<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>无限邮箱 - licn.com</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #fff5f7; font-family: system-ui, sans-serif; overflow: hidden; }
        .main-box { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 18px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        button { padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-pink { background: #ff85a2; color: white; }
        .btn-outline { background: #f0f0f0; border: none; color: #666; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .hidden { display: none; }
        .petal { position: absolute; top: -10%; background: #ffcce0; border-radius: 100% 0% 100% 0%; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="view-home" class="main-box">
        <div class="card">
            <h2>添加账号</h2>
            <input type="text" id="prefix" placeholder="前缀">
            <div style="font-size: 14px; color: #888; margin-bottom: 10px;">@licn.com</div>
            <input type="password" id="pass" placeholder="访问密码">
            <button class="btn-pink" onclick="addAccount()">确定进入</button>
        </div>
    </div>

    <div id="view-inbox" class="main-box hidden">
        <div class="card">
            <div class="header">
                <button style="width: auto; padding: 8px 15px;" class="btn-outline" onclick="showLogin()">+ 添加</button>
                <div style="font-weight: bold; color: #ff85a2; font-size: 0.9rem;" id="current-email"></div>
            </div>
            <button class="btn-pink" onclick="copyEmail()">📋 复制邮箱地址</button>
            <button class="btn-outline" onclick="refreshMail()">🔄 刷新收件箱</button>
            <div style="margin-top:20px; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
                <p style="font-size: 12px; color: #999;">收件箱记录：</p>
                <ul id="mail-list" style="padding-left: 20px;"><li>请点击刷新获取邮件</li></ul>
            </div>
        </div>
    </div>

    <script>
        let currentEmail = "";

        function copyEmail() {
            navigator.clipboard.writeText(currentEmail).then(() => alert("已复制到剪贴板！"));
        }

        function refreshMail() {
            const list = document.getElementById('mail-list');
            list.innerHTML = "<li>正在连接服务器...</li>";
            setTimeout(() => list.innerHTML = "<li>没有新邮件 (模拟)</li>", 1000);
        }

        function showLogin() {
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('view-inbox').classList.add('hidden');
        }

        function addAccount() {
            const prefix = document.getElementById('prefix').value;
            const pass = document.getElementById('pass').value;
            if(!prefix || !pass) return alert("请完整填写");
            currentEmail = prefix + "@licn.com";
            document.getElementById('current-email').innerText = currentEmail;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-inbox').classList.remove('hidden');
        }

        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.width = Math.random()*20+10+'px'; p.style.height = p.style.width;
            p.style.left = Math.random()*100+'%';
            p.style.animationDuration = Math.random()*5+5+'s';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 10000);
        }
        setInterval(createPetal, 1500);
    </script>
</body>
</html>
