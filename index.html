<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>无限邮箱 - 自动对接版</title>
    <style>
        /* 保持之前的花瓣和美观样式不变 */
        body { background: #fff5f7; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        button { padding: 15px; width: 100%; border: none; border-radius: 10px; background: #ff85a2; color: white; font-weight: bold; margin: 5px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="view-home" class="card">
        <h2>生成邮箱 (自动对接)</h2>
        <input type="text" id="prefix" placeholder="输入你想用的前缀" style="padding:15px; width:100%; box-sizing:border-box;">
        <button onclick="startEmail()">连接服务器</button>
    </div>

    <div id="view-inbox" class="card hidden">
        <h3 id="email-addr"></h3>
        <button onclick="checkMails()">🔄 刷新收件箱</button>
        <ul id="mail-list" style="text-align: left; padding-left: 20px;"><li>等待刷新...</li></ul>
        <button style="background:#888" onclick="location.reload()">退出</button>
    </div>

    <script>
        let currentPrefix = "";

        async function startEmail() {
            currentPrefix = document.getElementById('prefix').value;
            if(!currentPrefix) return alert("输入前缀");
            document.getElementById('email-addr').innerText = currentPrefix + "@1secmail.com";
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-inbox').classList.remove('hidden');
            checkMails();
        }

        async function checkMails() {
            const list = document.getElementById('mail-list');
            list.innerHTML = "<li>正在获取邮件...</li>";
            
            // 直接调用免费的临时邮箱 API
            const response = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${currentPrefix}&domain=1secmail.com`);
            const mails = await response.json();
            
            if(mails.length === 0) {
                list.innerHTML = "<li>当前无邮件</li>";
            } else {
                list.innerHTML = mails.map(m => `<li>来自: ${m.from} - ${m.subject}</li>`).join('');
            }
        }
    </script>
</body>
</html>
