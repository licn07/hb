<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>LC图库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background-image: url('./bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px 8px 30px;
        }

        .app {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 28px;
            padding: 16px 12px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .app::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
        }

        /* ----- 公告（默认显示） ----- */
        .notice {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(6px);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 12px;
            line-height: 1.5;
            position: relative;
            z-index: 1;
            display: block;
        }
        .notice .title {
            font-weight: 600;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .notice .title::before { content: '📢'; font-size: 14px; }
        .notice .actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            justify-content: flex-end;
        }
        .notice .actions button {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3px 12px;
            border-radius: 30px;
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .notice .actions button:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.16);
        }

        /* ----- 图片网格 ----- */
        .grid {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 4px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            position: relative;
            aspect-ratio: 9 / 14;
            transition: transform 0.2s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.45s ease forwards;
            will-change: transform, opacity;
        }
        .card.no-animation {
            animation: none !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .card:active { transform: scale(0.94); }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: rgba(0, 0, 0, 0.02);
        }

        .card .index-label {
            position: absolute;
            bottom: 4px;
            right: 6px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 1px 8px;
            border-radius: 30px;
            font-size: 10px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-weight: 500;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-tip {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            padding: 30px 0;
            backdrop-filter: blur(4px);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
        }

        /* ----- 底部信息（显示加载进度） ----- */
        .footer-info {
            text-align: center;
            margin-top: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            position: relative;
            z-index: 1;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: none;
        }

        /* ----- 灯箱 ----- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 92%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .lightbox .close {
            position: absolute;
            top: 18px;
            right: 22px;
            font-size: 32px;
            color: #fff;
            opacity: 0.7;
            cursor: pointer;
            z-index: 10001;
            font-weight: 300;
        }
        .lightbox .close:active { opacity: 1; }
        .lightbox .counter {
            position: absolute;
            bottom: 28px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            letter-spacing: 1px;
        }
        .lightbox .nav-area {
            position: absolute;
            top: 0;
            height: 100%;
            width: 25%;
            z-index: 10000;
            cursor: pointer;
        }
        .lightbox .nav-left { left: 0; }
        .lightbox .nav-right { right: 0; }

        /* ========== 进入弹窗 ========== */
        .entry-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 100000;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }
        .entry-modal.active { display: flex; }

        .entry-modal .modal-box {
            max-width: 380px;
            width: 100%;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 24px 20px 20px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .entry-modal .modal-box::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
        }

        .entry-modal .modal-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 14px;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .entry-modal .modal-body {
            font-size: 13px;
            line-height: 1.7;
            opacity: 0.92;
            margin-bottom: 20px;
            padding: 0 4px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .entry-modal .modal-body p {
            margin-bottom: 8px;
        }
        .entry-modal .modal-body .highlight {
            color: #ffd700;
            font-weight: 500;
        }

        .entry-modal .modal-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .entry-modal .modal-actions button {
            flex: 1;
            padding: 10px 0;
            border-radius: 40px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            letter-spacing: 0.5px;
        }
        .entry-modal .modal-actions .btn-reject {
            background: rgba(255, 70, 70, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 70, 70, 0.2);
            order: 0;
        }
        .entry-modal .modal-actions .btn-agree {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            order: 1;
        }
        .entry-modal .modal-actions button:active {
            transform: scale(0.94);
        }
        .entry-modal .modal-actions .btn-agree:active {
            background: rgba(255, 255, 255, 0.30);
        }
        .entry-modal .modal-actions .btn-reject:active {
            background: rgba(255, 70, 70, 0.30);
        }

        /* 退出覆盖层 */
        .exit-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 200000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            padding: 40px;
            text-align: center;
        }
        .exit-overlay.active { display: flex; }
        .exit-overlay .exit-icon { font-size: 48px; margin-bottom: 16px; }
        .exit-overlay .exit-text { font-size: 18px; opacity: 0.9; line-height: 1.6; }
        .exit-overlay .exit-sub { font-size: 13px; opacity: 0.4; margin-top: 8px; }
    </style>
</head>
<body>

    <!-- ====== 进入弹窗 ====== -->
    <div class="entry-modal" id="entryModal">
        <div class="modal-box">
            <div class="modal-title">📢 公告</div>
            <div class="modal-body">
                <p>尊敬的客户，为保障双方权益，现将海报服务相关事宜说明如下：</p>
                <p><strong>1. 风险说明：</strong>该海报存在风险（恢复原版海报冻结一段时间），不会封号。下单前请知悉风险。</p>
                <p><strong>2. 封功能补偿：</strong>若改完海报后账号24小时内被限制使用海报功能，请联系我，补偿名片一张  自定义图片不补</p>
                <p style="margin-top:12px; text-align:center; color:rgba(255,255,255,0.7);">
                    确认知晓请点“明白”，否则可选择“拒绝”退出。
                </p>
            </div>
            <div class="modal-actions">
                <button class="btn-reject" id="modalReject">拒绝</button>
                <button class="btn-agree" id="modalAgree">明白</button>
            </div>
        </div>
    </div>

    <!-- ====== 退出覆盖层 ====== -->
    <div class="exit-overlay" id="exitOverlay">
        <div class="exit-icon">🚫</div>
        <div class="exit-text">您已选择退出服务</div>
        <div class="exit-sub">页面即将关闭...</div>
    </div>

    <!-- ====== 主应用 ====== -->
    <div class="app">

        <!-- 标题栏已删除 -->

        <!-- 静态公告（默认显示） -->
        <div class="notice" id="staticNotice">
            <div class="title">公告</div>
            <div style="font-size:12px; line-height:1.6; opacity:0.95;">
                推荐图库半透明图比较稳<br>
                上号格式:系统+区+图片编号<br>
                例如:安卓q区+海报15号<br>
                <span style="color: #ff4d4d;">如遇加载缓慢，请尝试刷新或切换网络。</span>
            </div>
            <div class="actions">
                <button id="refreshNoticeBtn">🔄 刷新</button>
                <button id="sortNoticeBtn">📋 正序</button>
            </div>
        </div>

        <!-- 图片网格（初始隐藏） -->
        <div class="grid" id="imageGrid"></div>

        <!-- 底部信息（显示加载进度） -->
        <div class="footer-info" id="footerInfo">💡 点击图片放大 · 左右滑动切换</div>

    </div>

    <!-- ====== 图片灯箱 ====== -->
    <div class="lightbox" id="lightbox">
        <span class="close" id="closeLightbox">&times;</span>
        <img id="lightboxImg" src="" alt="预览">
        <span class="counter" id="imageCounter">1 / 1</span>
        <div class="nav-area nav-left" id="prevImage"></div>
        <div class="nav-area nav-right" id="nextImage"></div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const TOTAL_IMAGES = 411;          // 改为 411
        const IMAGE_EXT = 'jpg';
        const PAGE_SIZE = 20;

        // ---------- DOM 引用 ----------
        const grid = document.getElementById('imageGrid');
        const refreshBtn = document.getElementById('refreshNoticeBtn');
        const sortBtn = document.getElementById('sortNoticeBtn');
        const footerInfo = document.getElementById('footerInfo');

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const counter = document.getElementById('imageCounter');
        const closeBtn = document.getElementById('closeLightbox');
        const prevBtn = document.getElementById('prevImage');
        const nextBtn = document.getElementById('nextImage');

        const entryModal = document.getElementById('entryModal');
        const modalAgree = document.getElementById('modalAgree');
        const modalReject = document.getElementById('modalReject');
        const exitOverlay = document.getElementById('exitOverlay');

        // ---------- 数据 ----------
        let allImages = [];
        let filteredImages = [];
        let loadedCount = 0;          // 已加载数量
        let isLoaded = false;
        let sortAsc = true;
        let isLoadingMore = false;

        // ---------- 工具函数 ----------
        function getImagePath(index) {
            return `./${index}.${IMAGE_EXT}`;
        }

        // ---------- 创建单个卡片DOM ----------
        function createCardElement(num, index, withAnimation = true) {
            const div = document.createElement('div');
            div.className = 'card' + (withAnimation ? '' : ' no-animation');
            div.dataset.index = num;
            if (withAnimation) {
                div.style.animationDelay = (index * 8) + 'ms'; // 延迟减小，更流畅
            }
            div.innerHTML = `
                <img src="${getImagePath(num)}" alt="图片 ${num}" loading="lazy" onerror="this.style.display='none'">
                <span class="index-label">#${num}</span>
            `;
            return div;
        }

        // ---------- 渲染指定范围的卡片（追加或全量） ----------
        function renderRange(start, end, append = false, withAnimation = true) {
            const fragment = document.createDocumentFragment();
            for (let i = start; i < end; i++) {
                const num = filteredImages[i];
                const card = createCardElement(num, i, withAnimation);
                fragment.appendChild(card);
            }
            if (append) {
                grid.appendChild(fragment);
            } else {
                grid.innerHTML = '';
                grid.appendChild(fragment);
            }
            grid.style.display = 'grid';
            updateFooter();
        }

        // ---------- 加载更多（追加） ----------
        function loadMore() {
            if (isLoadingMore) return;
            if (loadedCount >= filteredImages.length) return;
            isLoadingMore = true;
            // 延迟一点，让滚动不卡
            setTimeout(() => {
                const start = loadedCount;
                const end = Math.min(loadedCount + PAGE_SIZE, filteredImages.length);
                renderRange(start, end, true, true); // 追加，带动画
                loadedCount = end;
                isLoadingMore = false;
                updateFooter();
                if (loadedCount >= filteredImages.length) {
                    removeScrollListener();
                }
            }, 30);
        }

        // ---------- 刷新 ----------
        function refreshGrid() {
            if (!isLoaded) {
                // 首次加载（由弹窗触发，但这里做保护）
                loadedCount = Math.min(PAGE_SIZE, filteredImages.length);
                renderRange(0, loadedCount, false, true);
                sortBtn.textContent = '📋 正序';
                isLoaded = true;
                addScrollListener();
                return;
            }
            // 刷新：重置已加载数量，重新从第一页加载，无动画（避免闪烁）
            loadedCount = Math.min(PAGE_SIZE, filteredImages.length);
            renderRange(0, loadedCount, false, false); // 无动画
            addScrollListener();
        }

        // ---------- 排序 ----------
        function toggleSort() {
            if (!isLoaded) {
                // 先加载
                loadedCount = Math.min(PAGE_SIZE, filteredImages.length);
                renderRange(0, loadedCount, false, true);
                sortBtn.textContent = '📋 正序';
                isLoaded = true;
                toggleSort(); // 递归执行排序
                return;
            }
            sortAsc = !sortAsc;
            filteredImages.sort((a, b) => sortAsc ? a - b : b - a);
            // 重新渲染当前已加载的范围，无动画（平滑切换）
            renderRange(0, loadedCount, false, false);
            sortBtn.textContent = sortAsc ? '📋 正序' : '📋 倒序';
            addScrollListener();
        }

        // ---------- 滚动监听管理 ----------
        let scrollHandler = null;

        function onScroll() {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight;
            if (scrollTop + windowHeight >= documentHeight - 200) {
                loadMore();
            }
        }

        function addScrollListener() {
            removeScrollListener();
            if (loadedCount < filteredImages.length) {
                scrollHandler = onScroll;
                window.addEventListener('scroll', scrollHandler, { passive: true });
            }
        }

        function removeScrollListener() {
            if (scrollHandler) {
                window.removeEventListener('scroll', scrollHandler);
                scrollHandler = null;
            }
        }

        // ---------- 更新底部信息 ----------
        function updateFooter() {
            if (!isLoaded) {
                footerInfo.style.display = 'none';
                return;
            }
            footerInfo.style.display = 'block';
            if (loadedCount >= filteredImages.length) {
                footerInfo.textContent = `✅ 已全部加载（共 ${filteredImages.length} 张）`;
            } else {
                footerInfo.textContent = `已加载 ${loadedCount}/${filteredImages.length}，继续滑动加载更多`;
            }
        }

        // ---------- 初始化数据 ----------
        function initData() {
            allImages = Array.from({ length: TOTAL_IMAGES }, (_, i) => i + 1);
            filteredImages = [...allImages];
        }

        // ---------- 灯箱事件 ----------
        grid.addEventListener('click', function(e) {
            const card = e.target.closest('.card');
            if (!card) return;
            const num = parseInt(card.dataset.index, 10);
            const idx = filteredImages.indexOf(num);
            if (idx !== -1) {
                openLightbox(idx);
            }
        });

        function openLightbox(index) {
            if (filteredImages.length === 0) return;
            currentLightboxIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        let currentLightboxIndex = 0;

        function updateLightbox() {
            const num = filteredImages[currentLightboxIndex];
            if (!num) return;
            lightboxImg.src = getImagePath(num);
            counter.textContent = `${currentLightboxIndex + 1} / ${filteredImages.length}`;
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function prevImage() {
            if (filteredImages.length === 0) return;
            currentLightboxIndex = (currentLightboxIndex - 1 + filteredImages.length) % filteredImages.length;
            updateLightbox();
        }

        function nextImage() {
            if (filteredImages.length === 0) return;
            currentLightboxIndex = (currentLightboxIndex + 1) % filteredImages.length;
            updateLightbox();
        }

        closeBtn.addEventListener('click', closeLightbox);
        prevBtn.addEventListener('click', prevImage);
        nextBtn.addEventListener('click', nextImage);
        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) closeLightbox();
        });

        let touchStartX = 0;
        lightbox.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        });
        lightbox.addEventListener('touchend', function(e) {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 40) {
                if (diff > 0) nextImage();
                else prevImage();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'Escape') closeLightbox();
        });

        // ---------- 弹窗控制 ----------
        function showEntryModal() {
            entryModal.classList.add('active');
        }

        function hideEntryModal() {
            entryModal.classList.remove('active');
        }

        modalAgree.addEventListener('click', function() {
            hideEntryModal();
            // 首次加载第一页，带动画
            loadedCount = Math.min(PAGE_SIZE, filteredImages.length);
            renderRange(0, loadedCount, false, true);
            isLoaded = true;
            sortBtn.textContent = '📋 正序';
            addScrollListener();
            updateFooter();
        });

        modalReject.addEventListener('click', function() {
            hideEntryModal();
            exitOverlay.classList.add('active');
            setTimeout(() => {
                window.close();
                setTimeout(() => {
                    window.location.href = 'about:blank';
                }, 500);
            }, 800);
        });

        // ---------- 按钮绑定 ----------
        refreshBtn.addEventListener('click', refreshGrid);
        sortBtn.addEventListener('click', toggleSort);

        // ---------- 启动 ----------
        initData();

        window.addEventListener('load', function() {
            // 优先加载背景
            const bgImg = new Image();
            bgImg.onload = function() {
                console.log('背景加载完成，预加载图片...');
                // 预加载所有图片（后台缓存）
                for (let i = 1; i <= TOTAL_IMAGES; i++) {
                    const img = new Image();
                    img.src = getImagePath(i);
                }
                setTimeout(showEntryModal, 300);
            };
            bgImg.onerror = function() {
                console.warn('背景加载失败，继续');
                for (let i = 1; i <= TOTAL_IMAGES; i++) {
                    const img = new Image();
                    img.src = getImagePath(i);
                }
                setTimeout(showEntryModal, 300);
            };
            bgImg.src = './bg.png';
        });

        console.log(`✅ LC图库启动，共 ${TOTAL_IMAGES} 张，分页加载每页 ${PAGE_SIZE} 张。`);
    </script>
</body>
</html>
